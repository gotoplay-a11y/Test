<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Універсальний Конвертер Валют</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl p-8 border border-slate-200">
        <!-- Заголовок -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">CurrencyConvert</h1>
            <p class="text-slate-500 text-sm">Актуальні курси валют у вашій кишені</p>
        </div>

        <div class="space-y-6">
            <!-- Поле введення суми -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Сума для конвертації</label>
                <div class="relative">
                    <input type="number" id="amount" value="100" 
                        class="w-full px-4 py-4 bg-slate-100 border-none rounded-2xl text-xl font-semibold focus:ring-2 focus:ring-blue-500 transition-all outline-none"
                        placeholder="Введіть суму...">
                </div>
            </div>

            <!-- Вибір валют -->
            <div class="grid grid-cols-1 gap-4 relative">
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-slate-400 uppercase mb-1 ml-1">З якої</label>
                    <select id="fromCurrency" class="p-4 bg-white border border-slate-200 rounded-2xl shadow-sm appearance-none cursor-pointer focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="UAH" selected>🇺🇦 UAH (Гривня)</option>
                        <option value="CZK">🇨🇿 CZK (Крона)</option>
                        <option value="USD">🇺🇸 USD (Долар)</option>
                        <option value="EUR">🇪🇺 EUR (Євро)</option>
                    </select>
                </div>

                <!-- Кнопка реверсу -->
                <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10 mt-2">
                    <button id="swapBtn" class="bg-blue-600 text-white p-3 rounded-full shadow-lg hover:bg-blue-700 transition-transform active:scale-90">
                        <i class="fas fa-retweet"></i>
                    </button>
                </div>

                <div class="flex flex-col">
                    <label class="text-xs font-bold text-slate-400 uppercase mb-1 ml-1">У яку</label>
                    <select id="toCurrency" class="p-4 bg-white border border-slate-200 rounded-2xl shadow-sm appearance-none cursor-pointer focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="UAH">🇺🇦 UAH (Гривня)</option>
                        <option value="CZK" selected>🇨🇿 CZK (Крона)</option>
                        <option value="USD">🇺🇸 USD (Долар)</option>
                        <option value="EUR">🇪🇺 EUR (Євро)</option>
                    </select>
                </div>
            </div>

            <!-- Результат -->
            <div class="bg-blue-50 rounded-2xl p-6 border border-blue-100 text-center">
                <p id="resultText" class="text-4xl font-bold text-blue-900 mb-1">0.00</p>
                <p id="rateInfo" class="text-xs text-blue-600 font-medium italic"></p>
            </div>

            <!-- Статус оновлення -->
            <div id="status" class="flex items-center justify-center gap-2 text-[10px] text-slate-400 uppercase tracking-widest">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                Дані оновлено щойно
            </div>
        </div>
    </div>

    <script>
        const amountInput = document.getElementById('amount');
        const fromCurrency = document.getElementById('fromCurrency');
        const toCurrency = document.getElementById('toCurrency');
        const resultText = document.getElementById('resultText');
        const rateInfo = document.getElementById('rateInfo');
        const swapBtn = document.getElementById('swapBtn');

        // Використовуємо вільне API (er-api.com)
        const API_URL = 'https://open.er-api.com/v6/latest/';

        let rates = {};

        async function fetchRates() {
            try {
                const response = await fetch(API_URL + 'USD');
                const data = await response.json();
                rates = data.rates;
                convert();
            } catch (error) {
                console.error('Помилка завантаження курсів:', error);
                document.getElementById('status').innerHTML = '<span class="text-red-500">Помилка з\'єднання</span>';
            }
        }

        function convert() {
            const amount = parseFloat(amountInput.value);
            const from = fromCurrency.value;
            const to = toCurrency.value;

            if (isNaN(amount)) {
                resultText.innerText = "0.00";
                return;
            }

            // Розрахунок через крос-курс відносно USD (якщо API базове в USD)
            const fromRate = rates[from];
            const toRate = rates[to];
            
            const convertedAmount = (amount / fromRate) * toRate;
            const singleRate = (1 / fromRate) * toRate;

            // Анімація цифр
            resultText.innerText = convertedAmount.toLocaleString('uk-UA', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            }) + ' ' + to;

            rateInfo.innerText = `Курс: 1 ${from} = ${singleRate.toFixed(4)} ${to}`;
        }

        swapBtn.addEventListener('click', () => {
            const temp = fromCurrency.value;
            fromCurrency.value = toCurrency.value;
            toCurrency.value = temp;
            convert();
        });

        [amountInput, fromCurrency, toCurrency].forEach(el => {
            el.addEventListener('input', convert);
        });

        // Ініціалізація
        window.addEventListener('load', fetchRates);
    </script>
     <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
   
</html>
